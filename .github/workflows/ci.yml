name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: jwt_auth_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: "123"
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # ./gradlew test forces the "test" Spring profile (see root build.gradle),
      # which defaults to this exact DB — no extra JWT_SECRET needed either,
      # application-test.yml ships a fixed non-sensitive default.
      SPRING_PROFILES_ACTIVE: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build (compile, test, checkstyle, pmd, jacoco)
        run: ./gradlew clean build

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            */build/reports/tests/
            */build/reports/checkstyle/
            */build/reports/pmd/
            */build/reports/jacoco/
          retention-days: 7
