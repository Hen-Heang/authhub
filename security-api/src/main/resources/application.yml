spring:
  application:
    name: security-api

  # Always load local-only secrets if the file is present (it's git-ignored).
  # "optional:" means this is silently skipped in environments without the file
  # (e.g. production), where DB_PASSWORD / JWT_SECRET come from real env vars.
  config:
    import: optional:classpath:application-local.yml

  datasource:
    hikari:
      connection-timeout: 20000
      maximum-pool-size: 5
    url: ${DB_URL:jdbc:postgresql://localhost:5432/jwt_auth}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD}


  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true



  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:your-email@gmail.com}
    password: ${MAIL_PASSWORD:your-app-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.oauth2.client.OAuth2ClientAutoConfiguration

jwt:
  secret: ${JWT_SECRET}
  expiration: PT24H
  refresh-token:
    expiration: P7D

google:
  # Comma-separated OAuth 2.0 client IDs from Google Cloud Console that are
  # allowed as the ID token audience. Empty means Google sign-in is disabled.
  client-ids: ${GOOGLE_CLIENT_IDS:}

app:
  frontend-url: http://localhost:3000
  reset-password:
    token-expiration-minutes: 1440
  email:
    from-name: AuthHub Team

server:
  port: 8080