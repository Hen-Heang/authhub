spring:
  application:
    name: security-api

  # Which profile-specific application-{profile}.yml to layer on top of this
  # base file. Defaults to "local" so `./gradlew :security-api:bootRun` works
  # out of the box; override with SPRING_PROFILES_ACTIVE in every other environment.
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  jpa:
    show-sql: false

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:your-email@gmail.com}
    password: ${MAIL_PASSWORD:your-app-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.oauth2.client.OAuth2ClientAutoConfiguration

jwt:
  secret: ${JWT_SECRET}
  expiration: PT24H
  refresh-token:
    expiration: P7D

google:
  # Comma-separated OAuth 2.0 client IDs from Google Cloud Console that are
  # allowed as the ID token audience. Empty means Google sign-in is disabled.
  client-ids: ${GOOGLE_CLIENT_IDS:}

app:
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
  reset-password:
    token-expiration-minutes: 1440
  email:
    from-name: AuthHub Team

server:
  port: ${SERVER_PORT:8080}
