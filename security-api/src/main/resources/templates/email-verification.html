<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Verify Your Email</title>
</head>
<body style="margin:0;padding:0;background-color:#f4f5f7;font-family:Arial,Helvetica,sans-serif;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="padding:24px 0;">
        <tr>
            <td align="center">
                <table role="presentation" width="480" cellpadding="0" cellspacing="0"
                       style="background-color:#ffffff;border-radius:8px;padding:32px;">
                    <tr>
                        <td style="font-size:20px;font-weight:bold;color:#1a1a1a;padding-bottom:16px;">
                            AuthHub
                        </td>
                    </tr>
                    <tr>
                        <td style="font-size:16px;color:#1a1a1a;padding-bottom:12px;">
                            Hi <span th:text="${name}">User</span>,
                        </td>
                    </tr>
                    <tr>
                        <td style="font-size:14px;color:#4a4a4a;line-height:1.5;padding-bottom:24px;">
                            Thanks for signing up for AuthHub. Please confirm your email address by
                            clicking the button below. This link will expire soon, and can only be
                            used once.
                        </td>
                    </tr>
                    <tr>
                        <td align="center" style="padding-bottom:24px;">
                            <a th:href="${verificationUrl}" href="#"
                               style="background-color:#16a34a;color:#ffffff;text-decoration:none;
                                      padding:12px 28px;border-radius:6px;font-size:14px;font-weight:bold;
                                      display:inline-block;">
                                Verify Email
                            </a>
                        </td>
                    </tr>
                    <tr>
                        <td style="font-size:13px;color:#8a8a8a;line-height:1.5;">
                            If you didn't create an AuthHub account, you can safely ignore this
                            email.
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
