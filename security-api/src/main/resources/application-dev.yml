# Shared dev/staging environment. All secrets must come from real env vars —
# no insecure fallback defaults here.
spring:
  datasource:
    hikari:
      connection-timeout: 20000
      maximum-pool-size: 10
    url: ${DB_URL:jdbc:postgresql://localhost:5432/jwt_auth}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

jwt:
  secret: ${JWT_SECRET}

mfa:
  encryption-key: ${MFA_ENCRYPTION_KEY}

logging:
  level:
    com.henheang: DEBUG
