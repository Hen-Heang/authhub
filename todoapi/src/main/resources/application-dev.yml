spring:
  datasource:
    hikari:
      connection-timeout: 20000
      maximum-pool-size: 10
    url: ${DB_URL:jdbc:postgresql://localhost:5432/jwt_auth}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

jwt:
  secret: ${JWT_SECRET}

logging:
  level:
    com.test: DEBUG
