# Used by `./gradlew test` and CI. The JWT secret default below is a fixed,
# non-sensitive value used only for running tests.
spring:
  datasource:
    hikari:
      connection-timeout: 20000
      maximum-pool-size: 5
    url: ${DB_URL:jdbc:postgresql://localhost:5432/jwt_auth_test}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:123}

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false

jwt:
  secret: ${JWT_SECRET:6KReGxxaodLtxSNprFo4WeStpovMt6VOqiFOA1FtY67PfSkPckod2OzDIKpnLgsYAjEjQGZThOknDp+CD2+gcA==}

logging:
  level:
    com.test: WARN
