spring:
  application:
    name: todoapi

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  jpa:
    show-sql: false

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:your-email@gmail.com}
    password: ${MAIL_PASSWORD:your-app-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.oauth2.client.OAuth2ClientAutoConfiguration

jwt:
  secret: ${JWT_SECRET}
  expiration: PT24H
  refresh-token:
    expiration: P7D

# Needed only because User.mfaSecret is @Convert-encrypted at the JPA level
# (see TodoappApplication) - todoapi never reads/writes this field itself.
# Must match security-api's MFA_ENCRYPTION_KEY (same encrypted column).
mfa:
  encryption-key: ${MFA_ENCRYPTION_KEY}

app:
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
  reset-password:
    token-expiration-minutes: 1440
  email:
    from-name: AuthHub Team

server:
  port: ${SERVER_PORT:8082}
