spring:
  datasource:
    hikari:
      connection-timeout: 20000
      maximum-pool-size: 20
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

jwt:
  secret: ${JWT_SECRET}

logging:
  level:
    root: WARN
    com.test: INFO
